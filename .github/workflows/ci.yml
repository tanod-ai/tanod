name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache-dependency-path: cli/go.mod
      - run: npm ci
      - run: npm test
      - run: npm test --prefix integrations/openclaw-plugin
      - run: go test ./...
        working-directory: cli
      - run: go build -o ../bin/tanod ./cmd/tanod
        working-directory: cli
      - run: npm ci
        working-directory: apps/console
      - run: npm run build
        working-directory: apps/console
