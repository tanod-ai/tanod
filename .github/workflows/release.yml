name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build, e.g. v0.1.0-alpha.2'
        required: true
        type: string

permissions:
  contents: write

jobs:
  vars:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      image: ${{ steps.vars.outputs.image }}
    steps:
      - name: Resolve release variables
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "image=brigss007/tanod-ai" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
      - run: npm ci
      - run: npm test
      - run: npm test --prefix integrations/openclaw-plugin
      - run: cd cli && go test ./...

  image:
    runs-on: ubuntu-latest
    needs: [vars, test]
    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Skip Docker Hub publish when secret is absent
        if: ${{ env.DOCKERHUB_TOKEN == '' }}
        run: echo "DOCKERHUB_TOKEN is not configured; skipping Docker Hub image publish."
      - uses: docker/setup-buildx-action@v3
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
      - uses: docker/login-action@v3
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        with:
          username: brigss007
          password: ${{ env.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        with:
          context: .
          push: true
          tags: |
            ${{ needs.vars.outputs.image }}:${{ needs.vars.outputs.tag }}
            ${{ needs.vars.outputs.image }}:latest

  packages:
    runs-on: ubuntu-latest
    needs: [vars, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p package/bin package/compose dist
          (cd cli && go build -trimpath -ldflags="-s -w" -o ../package/bin/tanod ./cmd/tanod)
          chmod 755 package/bin/tanod
      - name: Assemble package
        shell: bash
        run: |
          cp deployments/local-docker/docker-compose.yml package/compose/docker-compose.yml
          printf '%s\n' '${{ needs.vars.outputs.tag }}' > package/VERSION
          printf '%s:%s\n' '${{ needs.vars.outputs.image }}' '${{ needs.vars.outputs.tag }}' > package/IMAGE
          cp deployments/local-docker/README.md package/README.md
          tar -C package -czf "dist/tanod-ai_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: tanod-ai_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/tanod-ai_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [vars, packages]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Add installer and checksums
        shell: bash
        run: |
          cp scripts/install.sh dist/install.sh
          chmod 755 dist/install.sh
          (cd dist && sha256sum tanod-ai_*.tar.gz install.sh > checksums.txt)
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.vars.outputs.tag }}
          name: Tanod ${{ needs.vars.outputs.tag }}
          files: |
            dist/tanod-ai_linux_amd64.tar.gz
            dist/tanod-ai_linux_arm64.tar.gz
            dist/tanod-ai_darwin_amd64.tar.gz
            dist/tanod-ai_darwin_arm64.tar.gz
            dist/install.sh
            dist/checksums.txt
          generate_release_notes: true
