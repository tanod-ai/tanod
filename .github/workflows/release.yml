name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build, e.g. v0.1.0-alpha.1'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
      - run: npm ci
      - run: npm test
      - run: npm test --prefix integrations/openclaw-plugin
      - run: cd cli && go test ./...

  image:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve release variables
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          repo_lc="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "repo_lc=$repo_lc" >> "$GITHUB_OUTPUT"
      - name: Docker metadata
        id: meta
        shell: bash
        run: |
          image="ghcr.io/${{ steps.vars.outputs.repo_lc }}"
          echo "image=$image" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.vars.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest

  packages:
    runs-on: ubuntu-latest
    needs: image
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p package/bin package/compose dist
          go build -trimpath -ldflags="-s -w" -o package/bin/tanod ./cli/cmd/tanod
          chmod 755 package/bin/tanod
      - name: Assemble package
        shell: bash
        run: |
          cp deployments/local-docker/docker-compose.yml package/compose/docker-compose.yml
          printf '%s\n' '${{ needs.image.outputs.tag }}' > package/VERSION
          printf '%s:%s\n' '${{ needs.image.outputs.image }}' '${{ needs.image.outputs.tag }}' > package/IMAGE
          cp deployments/local-docker/README.md package/README.md
          tar -C package -czf "dist/tanod_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: tanod_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/tanod_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [image, packages]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Add installer and checksums
        shell: bash
        run: |
          cp scripts/install.sh dist/install.sh
          chmod 755 dist/install.sh
          (cd dist && sha256sum tanod_*.tar.gz install.sh > checksums.txt)
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.image.outputs.tag }}
          name: Tanod ${{ needs.image.outputs.tag }}
          files: |
            dist/tanod_linux_amd64.tar.gz
            dist/tanod_linux_arm64.tar.gz
            dist/tanod_darwin_amd64.tar.gz
            dist/tanod_darwin_arm64.tar.gz
            dist/install.sh
            dist/checksums.txt
          generate_release_notes: true
